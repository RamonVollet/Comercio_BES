name: CI and optional deploy

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  backend-check:
    runs-on: ubuntu-latest
    env:
      TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run build

      - name: Run tests when test database is configured
        if: ${{ env.TEST_DATABASE_URL != '' }}
        run: npm test

      - name: Skip tests notice
        if: ${{ env.TEST_DATABASE_URL == '' }}
        run: echo "TEST_DATABASE_URL not configured. Skipping integration tests."

  deploy-hostinger:
    needs: backend-check
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' }}
    env:
      HOSTINGER_SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
    steps:
      - name: Skip deploy notice
        if: ${{ env.HOSTINGER_SSH_HOST == '' }}
        run: echo "HOSTINGER_SSH_HOST not configured. Skipping deploy."

      - name: Deploy over SSH
        if: ${{ env.HOSTINGER_SSH_HOST != '' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT || 22 }}
          script: |
            cd ${{ secrets.HOSTINGER_APP_PATH }}
            git pull origin main
            cd backend
            npm ci --omit=dev
            npm run build
            if [ -f tmp/restart.txt ]; then touch tmp/restart.txt; fi
