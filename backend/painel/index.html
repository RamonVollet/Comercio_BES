<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel - Comercio BES</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/painel.css">
</head>
<body>

  <!-- ====== LOGIN / REGISTRO ====== -->
  <div id="auth-page" class="page active">
    <div class="auth-container">
      <div class="auth-header">
        <h1>Comercio <span>BES</span></h1>
        <p>Acesse seu painel</p>
      </div>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Entrar</button>
        <button class="auth-tab" data-tab="registro">Criar Conta</button>
      </div>

      <!-- Login Form -->
      <form id="login-form" class="auth-form">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" required placeholder="seu@email.com">
        </div>
        <div class="form-group">
          <label for="login-senha">Senha</label>
          <input type="password" id="login-senha" required placeholder="Sua senha" minlength="6">
        </div>
        <button type="submit" class="btn btn-primary btn-full">Entrar</button>
      </form>

      <!-- Registro Form -->
      <form id="registro-form" class="auth-form" style="display:none">
        <!-- Tipo de conta -->
        <div class="account-type-selector">
          <p class="account-type-label">Eu sou:</p>
          <div class="account-type-options">
            <label class="account-type-card active" data-tipo="cliente">
              <input type="radio" name="tipo" value="cliente" checked>
              <span class="account-icon">&#x1F464;</span>
              <span class="account-title">Cliente</span>
              <span class="account-desc">Quero comprar produtos e fazer pedidos</span>
            </label>
            <label class="account-type-card" data-tipo="comerciante">
              <input type="radio" name="tipo" value="comerciante">
              <span class="account-icon">&#x1F3EA;</span>
              <span class="account-title">Comerciante</span>
              <span class="account-desc">Tenho uma loja e quero vender</span>
            </label>
          </div>
        </div>

        <!-- Campos comuns -->
        <div class="form-group">
          <label for="reg-nome">Nome completo *</label>
          <input type="text" id="reg-nome" required placeholder="Seu nome">
        </div>
        <div class="form-group">
          <label for="reg-email">Email *</label>
          <input type="email" id="reg-email" required placeholder="seu@email.com">
        </div>
        <div class="form-group">
          <label for="reg-telefone">Telefone</label>
          <input type="tel" id="reg-telefone" placeholder="(16) 99999-9999">
        </div>
        <div class="form-group">
          <label for="reg-senha">Senha *</label>
          <input type="password" id="reg-senha" required placeholder="Minimo 6 caracteres" minlength="6">
        </div>

        <!-- Campos CLIENTE -->
        <div id="campos-cliente">
          <div class="form-group">
            <label for="reg-cpf">CPF</label>
            <input type="text" id="reg-cpf" placeholder="000.000.000-00" maxlength="14">
          </div>
        </div>

        <!-- Campos COMERCIANTE -->
        <div id="campos-comerciante" style="display:none">
          <div class="form-divider">
            <span>Dados do negocio</span>
          </div>
          <div class="form-group">
            <label for="reg-nome-fantasia">Nome fantasia *</label>
            <input type="text" id="reg-nome-fantasia" placeholder="Nome da sua loja/negocio">
          </div>
          <div class="form-group">
            <label for="reg-cpf-cnpj">CPF ou CNPJ *</label>
            <input type="text" id="reg-cpf-cnpj" placeholder="CPF ou CNPJ (somente numeros)" maxlength="18">
          </div>
          <div class="form-group">
            <label for="reg-endereco-comercial">Endereco comercial</label>
            <input type="text" id="reg-endereco-comercial" placeholder="Rua, numero - Bairro">
          </div>
          <div class="form-group">
            <label for="reg-telefone-comercial">WhatsApp comercial</label>
            <input type="tel" id="reg-telefone-comercial" placeholder="(16) 99999-9999">
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full">Criar Conta</button>
      </form>

      <div id="auth-error" class="alert alert-error" style="display:none"></div>
    </div>
  </div>

  <!-- ====== DASHBOARD (Comerciante + Cliente) ====== -->
  <div id="dashboard-page" class="page">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <h2>Comercio <span>BES</span></h2>
        <p id="sidebar-user-name"></p>
        <span id="sidebar-user-type" class="badge"></span>
      </div>
      <nav id="sidebar-nav">
        <!-- Populated by JS based on user type -->
      </nav>
      <div class="sidebar-footer">
        <button id="btn-logout" class="btn btn-outline btn-full">Sair</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main id="main-content">
      <header id="topbar">
        <button id="btn-menu" class="btn-icon">&#9776;</button>
        <h3 id="page-title">Visao Geral</h3>
        <div id="topbar-user">
          <span id="topbar-nome"></span>
        </div>
      </header>

      <div id="content-area">
        <!-- Sections injected by JS -->
      </div>
    </main>
  </div>

  <!-- ====== TOAST ====== -->
  <div id="toast-container"></div>

  <script src="js/painel.js"></script>
</body>
</html>
